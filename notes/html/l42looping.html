<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Looping</title>

        <style type="text/css">

        </style>
    </head>

    <body>
        <p>Welcome to JS Looping</p>

        <script type="text/javascript">
            const name = "Aung Aung";
            console.log(name);

            const arrs = ["red", "green", "blue", "white"];

            // console.log(arrs);

            // console.log(arrs[0]); // 0
            // console.log(arrs[1]); // 1
            // console.log(arrs[2]); // 2
            // console.log(arrs[3]); // 3
            // console.log(arrs[4]); // undefined

            // 1. For Loop
            for (var i = 0; i < 5; i++) {
                console.log(i); // 0 1 2 3 4
                // console.log(arrs[i]);
            }
            console.log("Hello Sir.");
            console.log("'i' outside value is = ", i);

            let j = 10;
            for (j; j <= 20; j++) {
                console.log(j); // 10 to 20
            }
            console.log("'j' outside value is = ", j);

            for (var k = 0; k <= 10; k++) {
                if (k === 5) {
                    console.log(`${k} is my favourite number.`);
                }
                console.log("'k' value is = ", k); // 0 to 10
            }
            console.log("'k' outside value is = ", k);

            // break keyword, သူက looping လုံးဝ ရပ်ချလိုက်တာ ဆက်မသွားတော့တာ
            for (var p = 0; p < 10; p++) {
                console.log(p); // 0 to 9

                if (p === 2) {
                    console.log(p + " is my favourite number.");
                    break;
                }
            }
            console.log("'p' outside value is = ", p);

            // continue keyword, သူက looping ကို တဆင့်ကျော်ချလိုက်တာ
            for (var q = 0; q < 10; q++) {
                // console.log(q); // ဒီအပေါ်မှာ ‌ရေးရင် ဒီ line ကို အရင် execute လုပ်တယ် ပြီမှ အောက်က if statement ကို စစ်တာ

                if (q == 2) {
                    console.log(q + " is my favourite number.");
                    continue;
                }

                // but if write 'console' after if statement along with 'continue', then it will skip this console.log(q)
                console.log(q);
            }
            console.log("'q' outside value is = ", q);

            for (var s = 10; s > 0; s--) {
                console.log(s); // 10 to 1
            }
            console.log("'s' outside value is = ", s);

            // Exercise
            let myarrs = ["red", "green", "blue", "pink", "steelblue"];

            for (var w = 0; w < myarrs.length; w++) {
                console.log(myarrs[w]);
            }

            const peoples = [
                {name: "Aung Aung", age: 25},
                {name: "Su Su", age: 30},
                {name: "Kyaw Kyaw", age: 23}
            ];

            console.log(peoples); // it will display the objects which are inside array
            console.log(typeof peoples); // object

            console.log(peoples[1]); // JS Object
            console.log(typeof peoples[1]); // object

            for (var i = 0; i < peoples.length; i++) {
                // console.log(i); // 0 1 2
                // console.log(peoples[i]);
                console.log(`Name: ${peoples[i].name}, Age: ${peoples[i].age}`);
            }

            // 2. For In Loop, it is very useful for Objects & Array
            let students = {
                name: "Aung Aung",
                city: "Mandalay",
                parent: "U Ba",
                phone: "0123456789"
            };

            // console.log(students);
            // console.log(students.name); // Aung Aung
            // console.log(students["city"]); // Mandalay
            // console.log(students.parent); // U Ba
            // console.log(students['phone']); // 0123456789

            for (var key in students) {
                console.log(students[key]); // bracket notation
            }

            const ourteams = ["Kyaw Kyaw", "Aung Aung", "Zaw Zaw", "Mg Mg"];
            for (let idx in ourteams) {
                console.log(ourteams[idx]);
            }

            const greeting = "Hello";
            for (var idx in greeting) {
                console.log(greeting[idx]);
            }

            // 3. For of Loop (array)
            const girls = ["Su Su", "Lu Lu", "Yu Yu", "Nu Nu"];
            for (var girl of girls) {
                console.log(girl);
            }

            const thanks = "Thank you";
            for (var char of thanks) {
                console.log(char);
            }

            // 4. while loop
            let b = 0;
            while (b < 10) {
                console.log("Number b value is = ", b); // 0 to 9
                b++;
            }
            console.log("b outside value is = ", b);

            let c = 0;
            while (c < 10) {
                c++;
                console.log("Number c value is = ", c); // 1 to 10
            }
            console.log("c coutside value is = ", c);

            // Exercise
            const paints = ["red", "green", "blue", "white", "black"];
            let num = 0;
            while (num < paints.length) {
                console.log("My paint color is = ", paints[num]);
                num++;
            }

            const laptop = [
                {
                    cpu: "core i9",
                    ram: "16GB",
                    hdd: "1TB"
                }
            ];

            // console.log(laptop);
            // console.log(laptop.length); // 1
            // console.log(laptop[0].cpu); // core i9

            let idxnum = 0;
            while (idxnum < laptop.length) {
                console.log(`CPU: ${laptop[idxnum].cpu}, RAM: ${laptop[idxnum].ram}, HDD: ${laptop[idxnum].hdd}`);
                idxnum++;
            }

            // 5. Do While Loop
            let n = 0;

            do {
                console.log("N value is = ", n);
                n++;
            } while (n < 10);
            console.log("Outside N value is = ", n);

            let g = 0;
            do {
                g++;
                console.log("G value is = ", g);
            } while (g < 10);
            console.log("Outside G value is = ", g);

            const colors = ["red", "green", "blue", "white", "black"];
            let init = 0;
            do {
                console.log("My Favourite color is: ", colors[init]);
                init++;
            } while (init < colors.length);

            // 6. For Each Loop
            const candycolors = ["red", "green", "blue", "white", "black"];

            // mainarrays.forEach(functin(value, index,array) { 
            //      code to be executed
            // });
            candycolors.forEach(function(value, index, array) {
                // console.log(value);
                // console.log(index);
                // console.log(array); // same as console.log(candycolors)

                console.log(`Index number is = ${index}, Value is = ${value}`);
            });

            // 7. Map Loop
            // mainarrays.map(function(value, index, array) {
            //      code to be executed
            // });
            const visitors = ["Sai Sai", "Aung Aung", "Naung Naung", "Su Su", "Yu Yu", "Nu Nu"];
            visitors.map (function(value, index, array) {
                // console.log(visitors); // it will print out whole array
                console.log(value); // it will print each item from array
                // console.log(index); // it will print each index of an item
                // console.log(array); // it will print out whole array smae as line 230
            });

            // difference between forEach and Map -
            // forEach ကကျတော့ variable ထဲ ထည့်လို့ မရဘူး
            // Map ကကျတော့ variable ထဲ ထည့်လို့ရတယ်။

            const visitorarrs = visitors.forEach (function(visitor) {
                return `Dr. ${visitor}`;
            });
            console.log(visitorarrs); // undefined

            const doctorarrs = visitors.map (function(visitor) {
                return `Dr. ${visitor}`;
            });
            console.log(doctorarrs);
            console.log(visitors);

            // 8. Filter Loop
            const ages = [23, 34, 56, 80, 13, 12, 18, 17, 10, 19, 60, 25, 21, 30, 14];
            console.log(ages); // 15 length

            const getover18 = ages.filter(function(age){
                // console.log(age);
                return age > 18;
            });
            console.log(getover18);

            const getover20 = ages.filter(function(age){
                return age > 20;
            });
            console.log(getover20);
        </script>
    </body>
</html>
