<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1.0" />
        <title>Object Literals (Javascript Objects)</title>

        <style type="text/css">

        </style>
    </head>

    <body>
        <p>Welcome to JS Object Literals</p>

        <script type="text/javascript">
            let students = {
                firstname: "Aye Chan",
                lastname: "Nyein",
                age: 28
            };

            console.log(students);
            console.info(students);
            console.table(students);
            console.log(typeof students); // object

            console.log(students.firstname); // Aye Chan
            console.log(students.lastname); // Nyein
            console.log(students.age); // 28
            console.log(typeof students.firstname); // string
            console.log(typeof students.age); // Number
        </script>
    </body>
</html>
