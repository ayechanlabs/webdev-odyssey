<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Local Storage</title>

        <style type="text/css">

        </style>
    </head>

    <body>
        <script type="text/javascript">
            // LocalStorage

            // => Create
            // syntax -> setItem(key, value);
            localStorage.setItem("name", "Aung Aung");
            localStorage.setItem("age", 27);
            localStorage.setItem("city", "Yangon");

            // => Update (edit)
            // Method 1
            localStorage.setItem("name", "Kyaw Kyaw");

            // Method 2
            localStorage.city = "Mandalay";

            // => Read
            // Method 1
            const getname = localStorage.name;
            const getage = localStorage.age;
            const getcity = localStorage.city;

            console.log(getname, getage, getcity);
            console.log(typeof getname, getage, getage);

            // Method 2
            const name = localStorage.getItem("name");
            const age = localStorage.getItem("age");
            const city = localStorage.getItem("city");

            console.log(name, age, city);

            // => Delete
            // Method 1 (Single Delete)
            // localStorage.removeItem("name");
            // localStorage.removeItem("age");
            // localStorage.removeItem("city");

            // console.log(name, age, city); // ဒီမှာ ရှိလိမ့်မယ် ဘာလို့ဆိုရင် variable ထဲမှာ ရှိနေလို့ 
            // console.log(localStorage.getItem("name"), age, city); // ဒီလိုဆိုရင် မရှိတော့ဘူး

            // Method 2 (All Delete)
            localStorage.clear(); // it will delete all

        </script>
    </body>
</html>

<!-- 
Database => data တွေကို သိမ်းတဲ့ နေရာမှာ ၂မျိုး ရှိတယ်။ Local Storage & Online Storage
နောက် သိမ်းတဲ့ နေရာမှာလည်း Temporary Storage ရယ်, Permanent Storage ရယ် ဆိုပြီ ၂မျိုး ရှိတယ်။
1. Temp Storage => Browser ထဲမှာ ခနသိမ်းတာ ဒါမဲ့ မတူညီတဲ့ browser က‌နေ data ယူလို့ မရဘူး
2. Per Storage => တကယ့် database ထဲမှာ သိမ်းတာ ပြောမယ်ဆိုရင် mysql, mongodb, firebase စသဖြင့်

Browser ထဲမှာ သိမ်းဆဲနိုင်တဲ့ memory 3 မျိုးရှိတယ်။
Cookies => 4kb
Local Storage => 5-10-20 Mb
Session Storage => 5 Mb

Cookies မှာ ကျတော့ tab တခုမှာ ရှိတဲ့ memory က နောက် tab တခုမှာ အသုံးပြုလို့ရတယ်။
Local Storage လည်း အတူတူ
Session ကျတော့ tab တခုဆီမှာပဲ ရှိနေတာ

Cookies က user delete လုပ်လို့ရတယ်။ timer ကနေ လည်း ဖြတ်လို့ရတယ်။
Local Storage က user delete လုပ်လိုက်တာနဲ့ ပြတ်သွားတယ်။
Session ကျတော့ user ဖြတ်လိုက်တာနဲ့ ပြတ်သွားတာ

Cookies ကျတော့ browser and server မှာ အလုပ်လုပ်တယ်။
Local Storage ကျတော့ browser မှာပဲ အလုပ်လုပ်တာ
Session ကျတော့ browser မှာပဲ အလုပ်လုပ်တာ
 -->
