<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1.0" />
        <title>Statement</title>

        <style type="text/css">

        </style>
    </head>

    <body>
        <p>Welcome to JS Statements.</p>

        <script type="text/javascript">
            // Statements
            // i. Ternary Operators (?)
            // ii. If Statement
            // iii. Switch Statement

            // Ternary Operators (?)
            // c1 statement c2 ? true : false;
            const x = 100;
            const y = 200;
            console.log(x > y ? "X is greater than Y" : "Y is greater than X");
            console.log(x < y ? "X is less than Y" : "Y is less than X");
            console.log(x == y ? "X is equal to Y" : "X is not equal to Y");
            console.log(x != y ? "X is not equal to Y" : "X is equal to Y");
            console.log(x == y ? "X is equal to Y" : (x > y ? "X is greater than Y" : "Y is greater than X"));

            const num1 = "200";
            const num2 = 200;

            console.log("== equal to result = " + num1 + num2); // this will give us -> "== equal to result = 200200", since code works left to right
            // double equal only checks value
            console.log("== equal to result = " + (num1 == num2 ? "True" : "False"));
            // tripe equal, check both value & datatype
            console.log("=== strict equal to result = " + (num1 === num2 ? "True" : "False"));

            console.log("> greater than result = " + (num1 > num2 ? "True" : "False"));
            console.log(">= greater than or equal result = " + (num1 >= num2 ? "True" : "False"));

            console.log("< less than result = " + (num1 < num2 ? "True" : "False"));
            console.log("<= less than or equal result = " + (num1 <= num2 ? "True" : "False"));

            const n1 = 100;
            const n2 = 200;
            // not equal, same is normal equal to, this will only check value
            console.log("!= not equal to result = " + (n1 != n2 ? "True" : "False"));
            // strict not equal, same is triple equal to, this will check both value and datatype
            // strict not equal will give us true value if both values and datatypes are not same.
            // otherwise it will give us false.
            console.log("!== strict not equal to result = " + (n1 !== n2 ? "True" : "False"));

            // IF Statement
            const idx = 30;

            if (idx < 10){
                console.log("Hello");
            }

            if (idx < 100){
                console.log("Hi");
            }

            // If...else...Statement
            if (idx > 100){
                console.log("Correct");
            }
            else {
                console.log("Incorrect"); // output
            }

            if (idx > 10){
                console.log("Correct"); // output
            }
            else {
                console.log("Incorrect");
            }

            if (idx == "30"){
                console.log("Correct"); // output
            }
            else {
                console.log("Incorrect");
            }

            if (idx === "30"){
                console.log("Correct");
            }
            else {
                console.log("Incorrect"); // output
            }

            if (idx != "30"){
                console.log("Correct");
            }
            else {
                console.log("Incorrect"); // output
            }

            if (idx !== "30"){
                console.log("Correct"); // output bcoz datatypes မတူလို့
            }
            else {
                console.log("Incorrect");
            }

            // else if()
            const j = 1000;
            const k = 1000;

            if (j > k){
                console.log("Yes, J is greater than K.");
            }
            else if(j === k){
                console.log("J is equal to K.");
            }
            else {
                console.log("No, J is less than K.")
            }

            // Nested Condition
            const passcode = "hifi123";
            console.log(passcode.length); // 7

            if (passcode.length >= 5){
                console.log("Good Passcode");
                
                if(passcode.indexOf(" ") === -1) {
                    console.log("Valid Passcode.");
                }
                else {
                    console.log("Passcode length is enough! but should not contain space.");
                }
            }
            else {
                console.log("Passcode must be longer");
            }

            // SWITCH Statement
            const user = "violet";

            switch(user) {
                case "red":
                    console.log("My Favourite Color is not Red.");
                    break;
                
                case "green":
                    console.log("My Favourite Color is not Green.");
                    break;
                
                case "white":
                    console.log("My Favourite Color is not White.");
                    break;

                case "violet":
                    console.log("Correct! My Favourite Color is Violet");
                    break;
                
                default:
                    console.log("Try Again!");
                    break;
            }

            let getday = new Date().getDay();
            let today;

            switch (getday) {
                case 0:
                    today = "Sunday";
                    break;

                case 1:
                    today = "Monday";
                    break;
                
                case 2:
                    today = "Tuesday";
                    break;

                case 3:
                    today = "Wednesday";
                    break;

                case 4:
                    today = "Thursday";
                    break;

                case 5:
                    today = "Friday";
                    break;
                
                case 6:
                    today = "Saturday";
                    break;
            }

            console.log(today);

            let p = 10;
            let q = 50;
            console.log(p); // 10
            console.log(q); // 50

            // p = q;
            // console.log(p); // 50

            // p += q; // p = p + q
            // console.log(p); // 60

            // p -= q; // p = p - q
            // console.log(p); // 40

            // p *= q; // p = p * q
            // console.log(p); // 500

            // q /= p; // q = q / p
            // console.log(q); // 5

            // q %= p; // q = q % p
            // console.log(q); // 0

            console.log("I'm Working.");

            // Exercise
            const username = prompt("Enter Username: ");
            const password = prompt("Enter Password: ");

            if (username === "susu" && password === "12345") {
                console.log("Welcome Su Su.")
            }
            else {
                console.log("Try Again.")
            }

            if (username === "susu" || password === "12345") {
                console.log("Welcome Su Su.");
            }
            else {
                console.log("Try Again.");
            }
        </script>
    </body>
</html>

<!-- 
Comparison Operators
== equal to
=== strict equal to (triple equals)
!= not equal
!== strict not equal (triple equals)
> greater than
< less than
>= greater than or equal to
<= less than or equal to
? statement (ternary operator)

Assignment Operators (=)
= equal
+= add
-= sub
*= mul
/= div
%= mod

Logical Operators
&& - and
|| - or
! - not

We use if-statement, the input values are unknown.
We use switch statement, if the input values are known.
 -->
