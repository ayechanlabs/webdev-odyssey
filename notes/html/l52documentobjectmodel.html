<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>DOM (Document Object Model)</title>
        <link href="../css/l52documentobjectmodel.css" rel="stylesheet" type="text/css" />
    </head>

    <body>
        <div class="container">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">To Do List</h3>

                    <form id="form" class="form" action="" method="">
                        <div class="form-group">
                            <label for="task">Enter New Task</label>
                            <input type="text" name="task" id="task" class="form-control" />
                        </div>

                        <input type="submit" class="btn" value="Add Task">
                    </form>
                </div>

                <div class="card-footer">
                    <h4 id="tasktitle">All My Tasks</h4>

                    <ul class="list-group">
                        <li class="list-group-item">
                            List Item 1
                            <a href="#" id="delete-item1" class="delete-item">
                                delete
                            </a>
                        </li>

                        <li class="list-group-item">
                            List Item 2
                            <a href="#" id="delete-item2" class="delete-item">
                                delete
                            </a>
                        </li>

                        <li class="list-group-item">
                            List Item 3
                            <a href="#" id="delete-item3" class="delete-item">
                                delete
                            </a>
                        </li>

                        <li class="list-group-item">
                            List Item 4
                            <a href="#" id="delete-item4" class="delete-item">
                                delete
                            </a>
                        </li>

                        <li class="list-group-item">
                            List Item 5
                            <a href="#" id="delete-item5" class="delete-item">
                                delete
                            </a>
                        </li>
                    </ul>

                    <a href="#" id="clearall" class="clear-tasks">Clear All Tasks</a>
                </div>

                <div class="moretasks">
                    <img src="https://cdn.pixabay.com/animation/2022/07/29/03/42/03-42-11-849_512.gif" id="loading" class="loading" alt="loader" />
                </div>
            </div>
        </div>

        <script src="../javascript/l52documentobjectmodel.js" type="text/javascript"></script>
    </body>
</html>
