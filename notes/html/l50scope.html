<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Scope</title>

        <style type="text/css">

        </style>
    </head>

    <body>
        <script type="text/javascript">
            // There are 2 types of Scopes.
            // 1. Global Scope
            // 2. Block Scope (but let and const are block-scoped, var is function-scoped)
            // 3. Function Scope

            const name = "Aye Chan";
                // name = "Kyaw Kyaw"; // we can re-assign value in global scope.
            // const name = "Su Su" // error, we can't re-declare variable in global scope.
            console.log(name);

            let city = "Mandalay";
                city = "Yangon";
            // let city = "Bago"; // error, we can't re-declare variable in global scope.
            console.log(city);

            var country = "Myanmar";
                country = "Thailand";
            var country = "Laos"; // we can re-declare variable in global scope.
            console.log(country);

            // Global Scope
            var globalVar = "I am a global variable";
            let globalLet = "I am a global let";
            const globalConst = "I am a global const";

            function accessGlobalScope() {
                console.log(globalVar); // accessible
                console.log(globalLet); // accessible
                console.log(globalConst); // accessible
            }

            accessGlobalScope();

            // we can also call global variables outside of function, it will be accessible.
            console.log(globalVar); // accessible
            console.log(globalLet); // accessible
            console.log(globalConst); // accessible
            
            // Local Scope
            function accessLocalScope() {
                var localVar = "I am a local variable";
                let localLet = "I am a local let";
                const localConst = "I am a local const";

                console.log(localVar); // accessible
                console.log(localLet); // accessible
                console.log(localConst); // accessible
            }

            accessLocalScope();

            // console.log(localVar); // error, not accessible
            // console.log(localLet); // error, not accessible
            // console.log(localConst); // error, not accessible

            // Block Scope
            function accessBlockScope() {
                if (true) {
                    var blockVar = "I am a block variable";
                    let blockLet = "I am a block let";
                    const blockConst = "I am a block const";

                    console.log(blockVar); // accessible
                    console.log(blockLet); // accessible
                    console.log(blockConst); // accessible
                }

                console.log(blockVar); // accessible, var is function-scoped
                // console.log(blockLet); // error, let is block-scoped
                // console.log(blockConst); // error, const is block-scoped
            }

            accessBlockScope();

            // Scope in for loop
            // for (const x = 0; x < 5; x++) {
            //     console.log(x); // 0 -> error, const is block-scoped.
            // }

            for (let b = 0; b < 5; b++) {
                console.log(b); // 0, 1, 2, 3, 4
            }
            // console.log(b); // errror, let is block-scoped.

            for (var d = 0; d < 5; d++) {
                console.log(d); // 0, 1, 2, 3, 4
            }
            console.log(d); // 5, var is function-scoped, so it is accessible outside of the loop.

            // Outside Declare
            const num1 = 0;
            let num2 = 0;
            var num3 = 0;

            // for (num1; num1 < 5; num1++) {
            //     console.log(num1); // 0 -> error, const is block-scoped.
            // }

            for (num2; num2 < 5; num2++) {
                console.log(num2); // 0, 1, 2, 3, 4
            }
            console.log("Num2 outside value is = ", num2); // 5, let is block-scoped, but we can access it outside of the loop because it is declared outside of the loop.

            for (num3; num3 < 5; num3++) {
                console.log(num3); // 0, 1, 2, 3, 4
            }
            console.log("Num3 outside value is = ", num3); // 5, var is function-scoped, so it is accessible outside of the loop.

            // New Declare
            const num4 = 1;
            let num5 = 2;
            var num6 = 3;

            // for (const num4 = 0; num4 < 5; num4++) {
            //     console.log(num4); // 0 -> error, const is block-scoped. 
            // }
            // console.log("Num4 outside value is = ", num4); // error

            for (let num5 = 0; num5 < 5; num5++) {
                console.log(num5); // 0, 1, 2, 3, 4
            }
            console.log("Num5 outside value is = ", num5); // 2, let is block-scoped, so it is not accessible outside of the loop.

            for (var num6 = 0; num6 < 5; num6++) {
                console.log(num6); // 0, 1, 2, 3, 4
            }
            console.log("Num6 outside value is = ", num6); // 5, var is function-scoped, so it is accessible outside of the loop.

            // __________________________________________________________

            // Scope in Function
            const number1 = 10;
            let number2 = 20;
            var number3 = 30;

            function funone() {
                console.log(number1 + number2 + number3); // 60, all variables are accessible in function scope.
            }
            funone();

            function funtwo() {
                const x = 100;
                const y = 200;
                const z = 300;

                console.log(x + y + z); // 600, all variables are accessible in function scope.
            }
            funtwo(); // 600

            console.log("Global Variable Number-1: ", number1); // 10, global variable is accessible outside of function.
            console.log("Global Variable Number-2: ", number2); // 20, global variable is accessible outside of function.
            console.log("Global Variable Number-3: ", number3); // 30, global variable is accessible outside of function.

            // console.log("Local Variable X: ", x); // error, local variable is not accessible outside of function.
            // console.log("Local Variable Y: ", y); // error, local variable is not accessible outside of function.
            // console.log("Local Variable Z: ", z); // error, local variable is not accessible outside of function.

            // override global variable in function scope
            const p = 1;
            let q = 2;
            var r = 3;

            function funthree() {
                // p = 10; // error
                q = 20;
                r = 30;

                console.log("From Function p value is: ", p); // 1, we can't re-assign value in function scope because it is declared as const in global scope.
                console.log("From Function q value is: ", q); // 20, we can re-assign value in function scope because it is declared as let in global scope.
                console.log("From Function r value is: ", r); // 30, we can re-assign value in function scope because it is declared as var in global scope.
            }
            funthree();

            console.log("From Outside Function p value is: ", p); // 1, we can't re-assign value in function scope because it is declared as const in global scope.
            console.log("From Outside Function q value is: ", q); // 20, we can re-assign value in function scope because it is declared as let in global scope.
            console.log("FromOutside Function r value is: ", r); // 30, we can re-assign value in function scope because it is declared as var in global scope.

            // New Declare
            const a = 10;
            let b = 20;
            var c = 30;

            function funfour() {
                const a = 100;
                let b = 200;
                var c = 300;

                console.log("From Function a value is: ", a); // 100
                console.log("From Function b value is: ", b); // 200
                console.log("From Function c value is: ", c); // 300
            }
            funfour();

            console.log("From Outside of Function a value is: ", a); // 10, since it is declared as const in global scope, it is not re-assigned in function scope, so it is accessible outside of function.
            console.log("From Outside of Function b value is: ", b); // 20, since it is declared as let in global scope, it is not re-assigned in function scope, so it is accessible outside of function.
            console.log("From Outside of Function c value is: ", c); // 30, since it is declared as var in global scope, it is not re-assigned in function scope, so it is accessible outside of function.

        </script>
    </body>
</html>
