<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Nested Function</title>

        <style type="text/css">

        </style>
    </head>
    
    <body>
        <script type="text/javascript">
            function outerfun() {

                function innerfun() {
                    console.log("Hello, I'm inner function");
                }

                innerfun();
            }

            outerfun();

            function greet() {

                return function() {
                    return "Hello, Sir!";
                }
            }

            let getGreet = greet(); // it will return value from inner function as a function.
            let message = getGreet(); // it will return "Hello, Sir!".
            console.log(getGreet);
            console.log(message);

            // we can also call like this, it will return "Hello, Sir!".
            console.log(greet()());

            function welcomefun(name) {
                return function() {
                    return `Welcome, ${name}!`;
                }
            }

            let welcomeMessage = welcomefun("Aye Chan");
            console.log(welcomeMessage()); // Welcome, Aye Chan!

            function addfun(x) {
                return function(y) {
                    return x + y;
                }
            }

            let getAddFun = addfun(10);
            console.log(getAddFun(20)); // 30

            console.log(addfun(50)(100)); // 150

            const multifun = num1 => num2 => num1 * num2;
            let getMultiFun = multifun(5);
            let result = getMultiFun(2);
            console.log(result); // 10

            let result2 = multifun(50)(2);
            console.log(result2); // 100

        </script>
    </body>
</html>
