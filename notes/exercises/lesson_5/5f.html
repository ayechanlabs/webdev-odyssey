<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0" />
        <title>CSS Exercise 5F</title>

        <link href="../../img/fav/youtube.png" rel="icon" type="image/png" sizes="64x64" />

        <style type="text/css">
            div {
                font-family: Arial;
            }

            .amount {
                font-size: 35px;

                margin-bottom: 0;
            }

            .currency {
                color: gray;
                font-size: 15px;
            }

            .today_price {
                color: green;
                font-size: 15px;

                margin-top: 10px;
                margin-bottom: 0;
            }

            .time {
                color: grey;
                font-size: 15px;

                margin-top: 10px;
            }

            .difference {
                color: red;
            }


        </style>
    </head>

    <body>
        <h3>CSS Exercise 5F</h3>

        <div>
            <p class="amount">1,049.61 <span class="currency">USD</span></p>
            <p class="today_price">+18.05 (1.75%) today</p>
            <p class="time">After hours 1.048.00 <span class="difference">-1.61 (0.15%)</span></p>
        </div>
    </body>


</html>
