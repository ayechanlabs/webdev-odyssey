<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1.0" />
        <title>CSS Exercise 5C</title>

        <link href="../../img/fav/youtube.png" rel="icon" type="image/png" sizes="64x64" />

        <style type="text/css">
            /* * {
                font-family: Verdana;
            } */

            .title, .sub_title, .info {
                font-family: Verdana;
            }

            .title {
                font-weight: bold;
                font-size: 18px;

                margin-bottom: 0;
            }

            .sub_title {
                color: grey;
                font-size: 15px;

                margin-top: 5px;
                margin-bottom: 18px;
            }

            .info {
                width: 300px;

                font-size: 15px;
                line-height: 22px;

                margin-bottom: 18px;
            }

            .get_started {
                background-color: #377E22;
                color: #ffffff;

                border: none;
                border-radius: 5px;

                padding: 10px 15px;

                cursor: pointer;
            }
        </style>
    </head>

    <body>
        <h3>5c. font = Verdana</h3>

        <p class="title">HTML CSS Course</p>
        <p class="sub_title">Beginner to Pro</p>

        <p class="info">In this course, we'll learn the skills<br/>you need to become a developer.</p>

        <input type="button" name="get_started" id="get_started" class="get_started" value="Get Started" />
    </body>
</html>
