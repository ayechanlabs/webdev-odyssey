<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1.0" />
        <title>CSS Exercise 5D</title>

        <link href="../../img/fav/instgram.png" rel="icon" type="image/png" sizes="64x64" />

        <style type="text/css">
            * {
                font-family: Arial;
            }

            div {
                width: 400px;

                text-align: center;
            }

            .title {
                font-size: 25px;
                font-weight: bold;

                margin-bottom: 15px;
            }

            .info {
                font-size: 15px;

                margin-bottom: 15px;
            }

            a {
                font-size: 14px;
                text-decoration: none;
            }
        </style>
    </head>

    <body>
        <h3>5d. font = Arial</h3>

        <div>
            <p class="title">Shopping for your business?</p>

            <p class="info">See how Apple at Work can help.</p>

            <a href="#">Learn more ></a>
        </div>


    </body>
</html>
