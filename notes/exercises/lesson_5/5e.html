<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>CSS Exercise 5E</title>

        <link href="../../img/fav/spotify.png" rel="icon" type="image/png" sizes="64x64" />

        <style type="text/css">
            div {
                font-family: Arial;
                text-align: center;
            }

            .new_p, .mac_pro, .supercharged, .buy_btn {
                font-weight: bold;
            }

            .new_p {
                color: #E47031;

                margin-bottom: 0;
            }

            .mac_pro {
                font-size: 30px;

                margin-top: 8px;
                margin-bottom: 0;
            }

            .supercharged {
                font-size: 50px;

                margin-top: 8px;
                margin-bottom: 0;
            }

            .price {
                font-size: 20px;

                margin-top: 8px;
            }

            .buy_btn {
                background-color: #306FDB;
                color: #ffffff;
                font-size: 15px;

                border: none;
                border-radius: 20px;

                padding: 10px 18px;

                cursor: pointer;
            }


        </style>
    </head>

    <body>
        <h3>CSS Exercise 5E</h3>

        <div>
            <p class="new_p">New</p>
            <p class="mac_pro">MacBook Pro</p>
            <p class="supercharged">Supercharged for pros.</p>
            <p class="price">From $1999</p>

            <input type="button" name="buy_btn" id="buy_btn" class="buy_btn" value="Buy" />
        </div>
    </body>
</html>
